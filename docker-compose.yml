version: '3.9'

services:
  backend:
    build: ./backend
    container_name: todo-backend
    restart: unless-stopped
    environment:
      - PORT=5000
    volumes:
      - ./data:/data
    networks:
      - todo-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - todo-net

networks:
  todo-net:
    driver: bridge
